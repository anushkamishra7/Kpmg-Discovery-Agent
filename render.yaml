services:
  - type: web
    name: kpmg-discoverability-agent
    runtime: python
    plan: standard          # 2 GB RAM — needed for torch + CLIP (free/starter 512MB will OOM)
    region: oregon
    healthCheckPath: /health
    # Pre-download CLIP at build time so first request doesn't time out
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "from transformers import CLIPModel, CLIPProcessor;
      CLIPModel.from_pretrained('openai/clip-vit-base-patch32');
      CLIPProcessor.from_pretrained('openai/clip-vit-base-patch32')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Keep the HF model cache inside the project dir so the build-time
      # download persists into the running service
      - key: HF_HOME
        value: /opt/render/project/src/.hf_cache
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: PINECONE_NAMESPACE
        sync: false
      - key: PINECONE_CLOUD
        sync: false
      - key: PINECONE_REGION
        sync: false
      - key: AEM_BASE_URL
        sync: false
      - key: AEM_BEARER_TOKEN
        sync: false
      - key: AEM_AUTH_TYPE
        sync: false
      - key: AEM_DAM_PATH
        sync: false
      - key: CLIP_MODEL_ID
        sync: false
      - key: EMBED_DIM
        sync: false
      - key: CLIENT
        sync: false
      - key: BATCH_SIZE
        sync: false
      - key: N_WORKERS
        sync: false
